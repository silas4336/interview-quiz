<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>面試挑戰 — 第21屆預約明天模擬面試</title>
<meta name="description" content="高三生必玩！8道模擬面試情境題，測試你的面試應對力。">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --sky: #EAF3FA;
    --sky-deep: #D0E4F0;
    --blue: #4A9EC5;
    --blue-dark: #357DA0;
    --coral: #E8886B;
    --coral-deep: #D4714F;
    --coral-light: #FCEEE9;
    --orange: #F2A95B;
    --orange-light: #FFF4E6;
    --white: #FFFFFF;
    --dark: #2C3E50;
    --dark-soft: #4A5568;
    --muted: #7B8CA3;
    --border: #D6E3ED;
    --green: #48BB78;
    --green-bg: #F0FFF4;
    --green-border: #C6F6D5;
    --red-bg: #FFF5F5;
    --red-border: #FED7D7;
    --red-text: #C53030;
    --radius: 20px;
    --radius-sm: 12px;
    --radius-xs: 8px;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }
  html { -webkit-tap-highlight-color: transparent; }
  body {
    font-family: 'Noto Sans TC', -apple-system, BlinkMacSystemFont, sans-serif;
    background: var(--sky);
    color: var(--dark);
    min-height: 100dvh;
    overflow-x: hidden;
    -webkit-font-smoothing: antialiased;
  }

  /* =========================================
     SCREENS — full page transitions
     ========================================= */
  .screen {
    min-height: 100vh;
    min-height: 100dvh;
    display: none;
    flex-direction: column;
  }
  #screen-landing {
    height: 100vh;
    height: 100dvh;
    max-height: 100vh;
    max-height: 100dvh;
    overflow: hidden;
  }
  .screen.active {
    display: flex;
    animation: screenIn 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  }
  @keyframes screenIn {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* =========================================
     SCREEN 1 — LANDING
     ========================================= */
  .landing {
    flex: 1;
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    padding: 0 24px max(16px, env(safe-area-inset-bottom));
    position: relative;
    overflow: hidden;
  }
  .landing-bg {
    position: absolute;
    bottom: 0; left: 0; right: 0;
    height: 35%;
    background: linear-gradient(to top, rgba(74,158,197,0.06), transparent);
    pointer-events: none;
  }

  /* Illustration row */
  .landing-illust {
    display: flex;
    align-items: flex-end;
    justify-content: center;
    gap: 0;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
    width: 100%;
    max-width: 340px;
  }
  .landing-illust img {
    height: 190px;
    object-fit: contain;
  }
  .landing-illust .illust-flip {
    transform: scaleX(-1);
  }

  /* Decorative floating elements */
  .deco {
    position: absolute;
    pointer-events: none;
    z-index: 0;
  }
  .deco-bubble {
    width: 36px; height: 28px;
    border: 2px solid var(--border);
    border-radius: 14px 14px 14px 4px;
    background: var(--white);
    opacity: 0.7;
    box-shadow: 0 2px 6px rgba(44,62,80,0.04);
  }
  .deco-bubble-r {
    border-radius: 14px 14px 4px 14px;
  }
  .deco-dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    opacity: 0.35;
  }
  .deco-q {
    font-size: 18px;
    font-weight: 900;
    opacity: 0.12;
    color: var(--blue);
  }
  .deco-check {
    font-size: 14px;
    opacity: 0.18;
  }
  .deco-dots {
    display: flex;
    gap: 3px;
    opacity: 0.5;
  }
  .deco-dots span {
    width: 4px; height: 4px;
    border-radius: 50%;
    background: var(--border);
    animation: dotBounce 1.2s ease infinite;
  }
  .deco-dots span:nth-child(2) { animation-delay: 0.15s; }
  .deco-dots span:nth-child(3) { animation-delay: 0.3s; }
  @keyframes dotBounce {
    0%, 80%, 100% { transform: translateY(0); }
    40% { transform: translateY(-3px); }
  }
  .landing-edition {
    font-size: 12px;
    font-weight: 700;
    color: var(--blue);
    background: var(--white);
    border: 1.5px solid var(--blue);
    padding: 4px 14px;
    border-radius: 99px;
    display: inline-block;
    margin-bottom: 16px;
    position: relative;
    z-index: 1;
  }
  .landing h1 {
    font-size: 30px;
    font-weight: 900;
    line-height: 1.35;
    color: var(--dark);
    margin-bottom: 10px;
    letter-spacing: -0.02em;
    position: relative;
    z-index: 1;
  }
  .landing h1 .accent { color: var(--coral); }
  .landing-sub {
    font-size: 15px;
    color: var(--dark-soft);
    line-height: 1.7;
    margin-bottom: 24px;
    position: relative;
    z-index: 1;
  }

  .landing-start {
    width: 100%;
    max-width: 320px;
    padding: 18px;
    background: var(--coral);
    color: var(--white);
    font-size: 17px;
    font-weight: 700;
    font-family: inherit;
    border: none;
    border-radius: var(--radius-sm);
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
    box-shadow: 0 6px 24px rgba(232,136,107,0.35);
    position: relative;
    z-index: 1;
    margin-bottom: 16px;
  }
  .landing-start:hover { background: var(--coral-deep); }
  .landing-start:active { transform: scale(0.97); }

  .landing-hint {
    font-size: 12px;
    color: var(--muted);
    position: relative;
    z-index: 1;
  }

  .landing-footer {
    position: absolute;
    bottom: max(10px, env(safe-area-inset-bottom));
    left: 0; right: 0;
    text-align: center;
    z-index: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 0 16px;
  }
  .landing-logos {
    width: calc(100% - 32px);
    max-width: 420px;
    object-fit: contain;
    opacity: 0.5;
  }
  .landing-bubbles {
    display: flex;
    justify-content: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .landing-bubble {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    font-size: 11px;
    font-weight: 600;
    color: var(--dark-soft);
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: 99px;
    padding: 6px 14px;
    text-decoration: none;
    transition: border-color 0.15s, background 0.15s;
    box-shadow: 0 1px 4px rgba(44,62,80,0.05);
  }
  .landing-bubble:hover {
    border-color: var(--blue);
    background: #F5FAFD;
  }
  .landing-bubble .dot-live {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--green);
    animation: blink 1.2s ease infinite;
    flex-shrink: 0;
  }
  .landing-bubble .b-icon {
    font-size: 13px;
    flex-shrink: 0;
  }

  /* =========================================
     SCREEN 2 — QUIZ (full screen)
     ========================================= */
  .quiz {
    background: var(--white);
    position: relative;
  }

  /* Quiz Header */
  .quiz-header {
    padding: 14px 20px;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    justify-content: space-between;
    position: sticky;
    top: 0;
    background: rgba(255,255,255,0.92);
    backdrop-filter: blur(12px);
    -webkit-backdrop-filter: blur(12px);
    z-index: 10;
  }
  .quiz-header-left {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .quiz-close {
    width: 32px; height: 32px;
    border-radius: 50%;
    border: 1.5px solid var(--border);
    background: var(--white);
    display: flex;
    align-items: center;
    justify-content: center;
    cursor: pointer;
    font-size: 14px;
    color: var(--muted);
    transition: border-color 0.15s;
    font-family: inherit;
  }
  .quiz-close:hover { border-color: var(--dark); color: var(--dark); }
  .quiz-progress-mini {
    font-size: 13px;
    font-weight: 700;
    color: var(--dark);
  }
  .quiz-score-mini {
    font-size: 13px;
    font-weight: 700;
    color: var(--green);
  }

  /* Progress bar */
  .quiz-progress-bar {
    height: 3px;
    background: var(--sky);
  }
  .quiz-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, var(--blue), var(--coral));
    transition: width 0.5s cubic-bezier(0.4, 0, 0.2, 1);
  }

  /* Quiz body */
  .quiz-body {
    flex: 1;
    display: flex;
    flex-direction: column;
    padding: 20px 20px 24px;
    max-width: 520px;
    margin: 0 auto;
    width: 100%;
  }

  /* Question area with transitions */
  .quiz-question-area {
    flex: 1;
    display: flex;
    flex-direction: column;
    transition: opacity 0.25s ease, transform 0.25s ease;
  }
  .quiz-question-area.slide-out {
    opacity: 0;
    transform: translateX(-20px);
  }
  .quiz-question-area.slide-in {
    opacity: 0;
    transform: translateX(20px);
  }

  /* Speaker block */
  .speaker {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 16px;
  }
  .speaker-avatar {
    width: 40px; height: 40px;
    border-radius: 50%;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .speaker-avatar-blue { background: #E3F0F8; }
  .speaker-avatar-coral { background: var(--coral-light); }
  .speaker-avatar-green { background: var(--green-bg); }
  .speaker-avatar-orange { background: var(--orange-light); }
  .speaker-name { font-size: 14px; font-weight: 700; color: var(--dark); }
  .speaker-tag {
    display: inline-block;
    font-size: 11px; font-weight: 600;
    padding: 2px 8px; border-radius: 99px; margin-top: 2px;
  }

  /* Question bubble */
  .q-bubble {
    background: var(--sky);
    border-radius: 18px;
    border-bottom-left-radius: 4px;
    padding: 18px 20px;
    font-size: 16px;
    line-height: 1.8;
    color: var(--dark);
    margin-bottom: 24px;
    position: relative;
  }

  /* Choices */
  .choices {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .choice {
    width: 100%;
    background: var(--white);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    text-align: left;
    cursor: pointer;
    font-size: 14px;
    font-family: inherit;
    color: var(--dark);
    line-height: 1.65;
    transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
    position: relative;
  }
  .choice:hover:not(:disabled) {
    border-color: var(--blue);
    background: #F5FAFD;
    transform: translateY(-1px);
  }
  .choice:active:not(:disabled) { transform: scale(0.99); }
  .choice.correct {
    background: var(--green-bg);
    border-color: var(--green);
    color: #22543D;
    animation: correctPop 0.4s ease;
  }
  .choice.wrong {
    background: var(--red-bg);
    border-color: #FC8181;
    color: var(--red-text);
    animation: shake 0.4s ease;
  }
  .choice.highlight {
    background: var(--green-bg);
    border-color: var(--green);
    color: #22543D;
    border-style: dashed;
  }

  /* Feedback */
  .feedback-area {
    display: none;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 16px;
  }
  .feedback-area.show { display: flex; animation: slideUp 0.3s ease; }

  .feedback-box {
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    font-size: 14px;
    line-height: 1.7;
  }
  .feedback-box.good {
    background: var(--green-bg);
    border: 1px solid var(--green-border);
    color: #22543D;
  }
  .feedback-box.bad {
    background: var(--orange-light);
    border: 1px solid #F5DEB3;
    color: #7B5B2E;
  }

  .fun-fact-box {
    background: var(--white);
    border: 1px dashed var(--blue);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--dark-soft);
  }
  .fun-fact-label {
    font-size: 11px;
    font-weight: 700;
    color: var(--blue);
    margin-bottom: 3px;
    letter-spacing: 0.03em;
  }

  /* Next button (bottom sticky) */
  .quiz-bottom {
    padding: 16px 20px;
    padding-bottom: max(16px, env(safe-area-inset-bottom));
    border-top: 1px solid var(--border);
    background: var(--white);
    position: sticky;
    bottom: 0;
  }
  .next-btn {
    width: 100%;
    max-width: 520px;
    margin: 0 auto;
    display: none;
    padding: 16px;
    background: var(--blue);
    color: var(--white);
    border: none;
    border-radius: var(--radius-sm);
    font-size: 16px;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    transition: background 0.15s, transform 0.1s;
  }
  .next-btn.show { display: block; animation: slideUp 0.2s ease; }
  .next-btn:hover { background: var(--blue-dark); }
  .next-btn:active { transform: scale(0.98); }

  /* Streak toast */
  .streak-toast {
    position: fixed;
    top: 80px;
    left: 50%;
    transform: translateX(-50%) translateY(-20px);
    background: var(--orange);
    color: var(--white);
    font-size: 14px;
    font-weight: 700;
    padding: 8px 20px;
    border-radius: 99px;
    opacity: 0;
    pointer-events: none;
    z-index: 50;
    transition: opacity 0.3s, transform 0.3s;
    white-space: nowrap;
  }
  .streak-toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }

  /* =========================================
     SCREEN 3 — RESULT
     ========================================= */
  .result {
    background: var(--sky);
    align-items: center;
    padding: 40px 20px;
  }
  .result-inner {
    width: 100%;
    max-width: 420px;
  }

  .result-card {
    background: var(--white);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 32px 24px;
    text-align: center;
    margin-bottom: 16px;
    box-shadow: 0 4px 24px rgba(44,62,80,0.08);
    animation: resultReveal 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  .result-emoji { font-size: 52px; display: block; margin-bottom: 8px; }
  .result-score { font-size: 52px; font-weight: 900; color: var(--blue); margin-bottom: 2px; }
  .result-score-label { font-size: 13px; color: var(--muted); margin-bottom: 12px; }
  .result-type {
    display: inline-block;
    font-size: 13px;
    font-weight: 700;
    padding: 5px 16px;
    border-radius: 99px;
    margin-bottom: 16px;
  }
  .type-master { background: #FFF7E0; color: #B7791F; border: 1px solid #FCEFC7; }
  .type-dark-horse { background: #E3F0F8; color: var(--blue-dark); border: 1px solid var(--sky-deep); }
  .type-grower { background: var(--green-bg); color: #276749; border: 1px solid var(--green-border); }
  .type-brave { background: var(--coral-light); color: var(--coral-deep); border: 1px solid #F5D3C8; }

  .result-title { font-size: 20px; font-weight: 900; color: var(--dark); margin-bottom: 10px; }
  .result-sub { font-size: 14px; color: var(--dark-soft); line-height: 1.75; margin-bottom: 20px; }
  .tip-box {
    background: var(--sky); border-radius: var(--radius-sm);
    padding: 16px; text-align: left; margin-bottom: 20px; border: 1px solid var(--sky-deep);
  }
  .tip-box h4 { font-size: 12px; font-weight: 700; color: var(--blue); margin-bottom: 6px; }
  .tip-box p { font-size: 14px; color: var(--dark-soft); line-height: 1.7; }

  .result-actions { display: flex; flex-direction: column; gap: 10px; }
  .btn-ghost {
    width: 100%; padding: 14px; background: transparent;
    color: var(--muted); font-size: 14px; font-weight: 600;
    font-family: inherit; border: 1.5px solid var(--border);
    border-radius: var(--radius-sm); cursor: pointer; transition: all 0.15s;
  }
  .btn-ghost:hover { border-color: var(--blue); color: var(--blue); }

  /* Register CTA */
  .register-cta {
    background: linear-gradient(135deg, var(--coral) 0%, var(--orange) 100%);
    border-radius: var(--radius); padding: 28px 24px;
    text-align: center; position: relative; overflow: hidden;
    margin-bottom: 16px;
    animation: slideUp 0.5s 0.3s ease both;
  }
  .register-cta::before {
    content: ''; position: absolute; top: -30px; right: -30px;
    width: 120px; height: 120px; border-radius: 50%; background: rgba(255,255,255,0.1);
  }
  .register-cta::after {
    content: ''; position: absolute; bottom: -40px; left: -20px;
    width: 100px; height: 100px; border-radius: 50%; background: rgba(255,255,255,0.08);
  }
  .register-cta > * { position: relative; z-index: 1; }
  .register-cta .cta-label {
    font-size: 12px; font-weight: 700; color: rgba(255,255,255,0.8);
    margin-bottom: 8px; letter-spacing: 0.04em;
  }
  .register-cta h2 {
    font-size: 22px; font-weight: 900; color: var(--white); line-height: 1.4; margin-bottom: 14px;
  }
  .register-cta .cta-info {
    font-size: 13px; color: rgba(255,255,255,0.9); line-height: 1.8; margin-bottom: 6px;
  }
  .register-cta .cta-deadline {
    display: inline-block; background: rgba(255,255,255,0.2);
    border-radius: 99px; padding: 4px 14px;
    font-size: 12px; font-weight: 700; color: var(--white);
    margin-bottom: 18px; backdrop-filter: blur(4px);
  }
  .btn-register {
    display: inline-block; background: var(--white); color: var(--coral-deep);
    font-size: 16px; font-weight: 900; font-family: inherit;
    padding: 15px 36px; border-radius: var(--radius-sm);
    text-decoration: none; border: none; cursor: pointer;
    transition: transform 0.15s, box-shadow 0.15s;
    box-shadow: 0 4px 16px rgba(0,0,0,0.15);
  }
  .btn-register:hover { transform: translateY(-1px); box-shadow: 0 6px 24px rgba(0,0,0,0.2); }

  /* Logos footer */
  .result-logos {
    text-align: center;
    margin-bottom: 16px;
  }
  .result-logos img {
    width: 100%;
    max-width: 400px;
    object-fit: contain;
  }
  .result-footer {
    text-align: center;
    font-size: 11px;
    color: var(--muted);
    line-height: 1.8;
    padding-bottom: 20px;
  }

  /* =========================================
     CONFETTI CANVAS
     ========================================= */
  #confetti-canvas {
    position: fixed; top: 0; left: 0; width: 100%; height: 100%;
    pointer-events: none; z-index: 200;
  }

  /* =========================================
     KEYFRAMES
     ========================================= */
  @keyframes slideUp {
    from { opacity: 0; transform: translateY(12px); }
    to { opacity: 1; transform: translateY(0); }
  }
  @keyframes correctPop {
    0% { transform: scale(1); }
    30% { transform: scale(1.02); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    20% { transform: translateX(-4px); }
    40% { transform: translateX(4px); }
    60% { transform: translateX(-3px); }
    80% { transform: translateX(2px); }
  }
  @keyframes resultReveal {
    0% { opacity: 0; transform: scale(0.92) translateY(20px); }
    100% { opacity: 1; transform: scale(1) translateY(0); }
  }
  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  /* =========================================
     RESPONSIVE
     ========================================= */
  @media (min-width: 520px) {
    .landing h1 { font-size: 34px; }
    .landing-illust img { height: 220px; }
  }
</style>
</head>
<body>

<canvas id="confetti-canvas"></canvas>

<!-- =============================================
     SCREEN 1 — LANDING
     ============================================= -->
<div class="screen active" id="screen-landing">
  <div class="landing">
    <div class="landing-bg"></div>

    <div class="landing-illust">
      <!-- Decorative elements like poster -->
      <div class="deco deco-bubble" style="top:-8px;left:8%"></div>
      <div class="deco deco-dots" style="top:6px;left:calc(8% + 10px)"><span></span><span></span><span></span></div>
      <div class="deco deco-bubble deco-bubble-r" style="top:-12px;right:6%"></div>
      <div class="deco deco-dots" style="top:2px;right:calc(6% + 8px)"><span></span><span></span><span></span></div>
      <div class="deco deco-q" style="top:30%;left:0">？</div>
      <div class="deco deco-check" style="top:25%;right:2%">&#10003;</div>
      <div class="deco deco-dot" style="bottom:30%;left:2%;background:var(--coral)"></div>
      <div class="deco deco-dot" style="top:15%;right:15%;background:var(--blue)"></div>

function shuffle(arr) {
  var a = arr.slice();
  for (var i = a.length - 1; i > 0; i--) {
    var j = Math.floor(Math.random() * (i + 1));
    var t = a[i]; a[i] = a[j]; a[j] = t;
  }
  return a;
}

function getRandomFact() {
  if (usedFacts.length >= funFacts.length) usedFacts = [];
  var avail = funFacts.filter(function(_, i) { return usedFacts.indexOf(i) === -1; });
  var idx = Math.floor(Math.random() * avail.length);
  usedFacts.push(funFacts.indexOf(avail[idx]));
  return avail[idx];
}

}

function restart() {

    btn.className = 'choice';
    btn.textContent = c;
    btn.onclick = function() { choose(i); };
    choicesEl.appendChild(btn);
  });

  document.getElementById('fb-area').className = 'feedback-area';
  document.getElementById('next-btn').className = 'next-btn';
  answered = false;
}

function choose(i) {
  if (answered) return;
  answered = true;
  var q = shuffled[current];
  var btns = document.querySelectorAll('.choice');
  btns.forEach(function(b) { b.disabled = true; });

  var fbBox = document.getElementById('fb-box');

  if (i === q.ans) {
    var bonus = streak >= 2 ? 5 : 0;
    score += 10 + bonus;
    streak++;
    btns[i].classList.add('correct');
    fbBox.textContent = q.fb_good;
    fbBox.className = 'feedback-box good';

    if (streak >= 2) launchConfetti();
    if (streak >= 3) showStreakToast(streak);
  } else {
    streak = 0;
    btns[i].classList.add('wrong');
    btns[q.ans].classList.add('highlight');
    fbBox.textContent = q.fb_bad;
    fbBox.className = 'feedback-box bad';
    wrongCats.push(q.cat);
  }

  document.getElementById('q-score-mini').textContent = score + ' \u5206';

  document.getElementById('ff-text').textContent = getRandomFact();
  document.getElementById('fb-area').className = 'feedback-area show';

  var next = document.getElementById('next-btn');
  next.className = 'next-btn show';
  next.textContent = current + 1 >= shuffled.length ? '\u770B\u7D50\u679C' : '\u4E0B\u4E00\u984C';
}

function nextQuestion() {
  current++;
  if (current >= shuffled.length) {
    showResult();
    return;
  }
  var area = document.getElementById('q-area');
  area.classList.add('slide-out');
  setTimeout(function() {
    renderQuestion();
    area.classList.remove('slide-out');
    area.classList.add('slide-in');
    requestAnimationFrame(function() {
      requestAnimationFrame(function() {
        area.classList.remove('slide-in');
      });
    });
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }, 250);
}

/* ============================================
   STREAK TOAST
   ============================================ */
function showStreakToast(n) {
  var toast = document.getElementById('streak-toast');
  toast.textContent = '\uD83D\uDD25 \u9023\u5C0D ' + n + ' \u984C\uFF01';
  toast.classList.add('show');
  setTimeout(function() { toast.classList.remove('show'); }, 1800);
}

function getPersonality(s) {
  for (var i = 0; i < personalityTypes.length; i++) {
    if (s >= personalityTypes[i].min) return personalityTypes[i];
  }
  return personalityTypes[personalityTypes.length - 1];
}

function showResult() {
  showScreen('screen-result');
  var p = getPersonality(score);

  document.getElementById('r-emoji').textContent = p.emoji;
  document.getElementById('r-title').textContent = p.title;
  document.getElementById('r-sub').textContent = p.sub(score);

  // Dynamic tips based on wrong categories
  var tipEl = document.getElementById('r-tip');
  if (wrongCats.length === 0) {
    tipEl.innerHTML = '<h4>\u5168\u5C0D\uFF01\u6700\u5F8C\u63D0\u9192</h4><p>\u4F60\u7684\u9762\u8A66\u89C0\u5FF5\u975E\u5E38\u6B63\u78BA\uFF01\u5225\u5FD8\u4E86 4/25 \u4F86\u73FE\u5834\u5BE6\u969B\u7DF4\u7FD2\uFF0C\u300C\u77E5\u9053\u300D\u548C\u300C\u505A\u5230\u300D\u4E4B\u9593\u9084\u6709\u4E00\u6BB5\u8DDD\u96E2\uFF0C\u8B93\u5C08\u5BB6\u5E6B\u4F60\u6A21\u64EC\u5BE6\u6230\uFF01</p>';
  } else {
    var uniqueCats = [];
    wrongCats.forEach(function(c) { if (uniqueCats.indexOf(c) === -1) uniqueCats.push(c); });
    var tipParts = uniqueCats.slice(0, 3).map(function(c) {
      return '<div style="margin-bottom:10px"><strong style="color:var(--coral)">' + c + '</strong><br>' + (catTips[c] || '') + '</div>';
    });
    var heading = uniqueCats.length === 1 ? '\u9019\u984C\u53EF\u4EE5\u52A0\u5F37' : '\u9019\u5E7E\u984C\u53EF\u4EE5\u52A0\u5F37';
    tipEl.innerHTML = '<h4>' + heading + '</h4>' + tipParts.join('');
  }

  var typeEl = document.getElementById('r-type');
  typeEl.textContent = p.type;
  typeEl.className = 'result-type ' + p.typeClass;

  // Animate score count up
  var scoreEl = document.getElementById('r-score');
  scoreEl.textContent = '0';
  var target = score, step = 0, steps = 30;
  var interval = setInterval(function() {
    step++;
    var ease = 1 - Math.pow(1 - step / steps, 3);
    scoreEl.textContent = Math.round(target * ease);
    if (step >= steps) { scoreEl.textContent = target; clearInterval(interval); }
  }, 30);

  setTimeout(function() { launchConfetti(); }, 300);
  updateCountdown();
}

/* ============================================
   COUNTDOWN
   ============================================ */
function updateCountdown() {
  var deadline = new Date('2026-04-20T23:59:59+08:00');
  var now = new Date();
  var diff = deadline - now;
  var landingEl = document.getElementById('landing-countdown');
  var ctaEl = document.getElementById('cta-deadline');

  if (diff <= 0) {
    if (landingEl) landingEl.textContent = '\u5831\u540D\u5373\u5C07\u622A\u6B62\uFF01';
    if (ctaEl) ctaEl.textContent = '\u5831\u540D\u5373\u5C07\u622A\u6B62\uFF01';
    return;
  }
  var days = Math.floor(diff / 86400000);
  var hours = Math.floor((diff % 86400000) / 3600000);
  var txt = days > 0
    ? '4/25 \u514D\u8CBB\u6A21\u64EC\u9762\u8A66\u30FB\u5831\u540D\u5012\u6578 ' + days + ' \u5929'
    : '\u5831\u540D\u5012\u6578 ' + hours + ' \u5C0F\u6642\uFF01';
  if (landingEl) landingEl.textContent = txt;
  if (ctaEl) ctaEl.textContent = '\u5269 ' + days + ' \u5929\u622A\u6B62\uFF0C\u540D\u984D\u6709\u9650';
}

/* ============================================
   CONFETTI
   ============================================ */
var confettiCanvas, confettiCtx, confettiPieces = [], confettiAnimId = null;
var COLORS = ['#E8886B', '#4A9EC5', '#F2A95B', '#48BB78', '#9F7AEA', '#ED64A6'];

function initConfetti() {
  confettiCanvas = document.getElementById('confetti-canvas');
  confettiCtx = confettiCanvas.getContext('2d');
  resize();
  window.addEventListener('resize', resize);
}
function resize() {
  confettiCanvas.width = window.innerWidth;
  confettiCanvas.height = window.innerHeight;
}
function launchConfetti() {
  confettiPieces = [];
  for (var i = 0; i < 50; i++) {
    confettiPieces.push({
      x: Math.random() * confettiCanvas.width,
      y: -10 - Math.random() * 40,
      w: 4 + Math.random() * 4, h: 8 + Math.random() * 6,
      color: COLORS[Math.floor(Math.random() * COLORS.length)],
      vx: (Math.random() - 0.5) * 3, vy: 2 + Math.random() * 3,
      rot: Math.random() * 360, rotV: (Math.random() - 0.5) * 8, opacity: 1
    });
  }
  if (!confettiAnimId) animConfetti();
}
function animConfetti() {
  confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height);
  var alive = false;
  confettiPieces.forEach(function(p) {
    p.x += p.vx; p.y += p.vy; p.vy += 0.06; p.rot += p.rotV;
    if (p.y > confettiCanvas.height * 0.75) p.opacity -= 0.02;
    if (p.opacity <= 0) return;
    alive = true;
    confettiCtx.save();
    confettiCtx.translate(p.x, p.y);
    confettiCtx.rotate(p.rot * Math.PI / 180);
    confettiCtx.globalAlpha = Math.max(0, p.opacity);
    confettiCtx.fillStyle = p.color;
    confettiCtx.fillRect(-p.w / 2, -p.h / 2, p.w, p.h);
    confettiCtx.restore();
  });
  if (alive) confettiAnimId = requestAnimationFrame(animConfetti);
  else { confettiAnimId = null; confettiCtx.clearRect(0, 0, confettiCanvas.width, confettiCanvas.height); }
}

/* ============================================
   INIT
   ============================================ */
initConfetti();
updateCountdown();
setInterval(updateCountdown, 60000);
